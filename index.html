<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>n_ecs_link_test</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      padding: 2rem 1rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 16px 48px rgba(0,0,0,0.6),
        0 4px 16px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #f78166);
      border-radius: 16px 16px 0 0;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem auto;
      box-shadow: 0 4px 20px rgba(56, 139, 253, 0.35);
    }

    .icon svg {
      width: 32px;
      height: 32px;
      fill: #ffffff;
    }

    .project-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f0f6fc;
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    .project-name span {
      color: #58a6ff;
    }

    .subtitle {
      font-size: 0.92rem;
      color: #8b949e;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 0 0 2rem 0;
    }

    .repo-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.1rem 1.3rem;
      text-align: left;
      transition: border-color 0.2s ease;
    }

    .repo-section:hover {
      border-color: #58a6ff;
    }

    .repo-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 0.45rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .repo-label svg {
      width: 13px;
      height: 13px;
      fill: #8b949e;
    }

    .repo-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #58a6ff;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      letter-spacing: 0.01em;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .stat-value {
      font-size: 1.35rem;
      font-weight: 800;
      color: #f0f6fc;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 1.5rem 1rem;
      border-top: 1px solid #21262d;
      margin-top: auto;
    }

    .footer-text {
      font-size: 0.82rem;
      color: #6e7681;
      letter-spacing: 0.04em;
    }

    .footer-text strong {
      color: #8b949e;
      font-weight: 600;
    }

    .footer-text .heart {
      color: #f78166;
      margin: 0 0.15rem;
    }

    @media (max-width: 500px) {
      .card {
        padding: 2.2rem 1.5rem;
      }
      .project-name {
        font-size: 1.55rem;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <span class="badge">&#9679; Active Project</span>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
            10-4.48 10-10S17.52 2 12 2zm-1
            14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>

      <h1 class="project-name">
        n_ecs_<span>link</span>_test
      </h1>
      <p class="subtitle">
        ECS link integration test suite &mdash; validating service connectivity,<br/>
        discovery, and runtime linking across environments.
      </p>

      <hr class="divider"/>

      <div class="repo-section">
        <div class="repo-label">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2A10 10 0 0 0 2 12c0 4.42
              2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6
              1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07
              2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92
              0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64
              0 0 .84-.27 2.75 1.02.79-.22 1.65-.33
              2.5-.33.85 0 1.71.11 2.5.33
              1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1
              2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34
              4.66-4.57 4.91.36.31.69.92.69 1.85V21c0
              .27.16.59.67.5C19.14 20.16 22 16.42 22
              12A10 10 0 0 0 12 2z"/>
          </svg>
          Repository
        </div>
        <span class="repo-name">n_ecs_link_test_repo</span>
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-value">ECS</span>
          <span class="stat-label">Platform</span>
        </div>
        <div class="stat">
          <span class="stat-value">Link</span>
          <span class="stat-label">Type</span>
        </div>
        <div class="stat">
          <span class="stat-value">Test</span>
          <span class="stat-label">Mode</span>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p class="footer-text">
      <span class="heart">&#9829;</span>
      Developed by <strong>Royal Bengal AI</strong>
      <span class="heart">&#9829;</span>
    </p>
  </footer>

</body>
</html>
